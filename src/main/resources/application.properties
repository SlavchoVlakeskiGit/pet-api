spring.application.name=pet-api
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/petdb
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=900000
jwt.refresh-expiration=604800000

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.repositories.enabled=false

spring.data.mongodb.uri=mongodb://localhost:27017/petdb
spring.data.mongodb.auto-index-creation=true

spring.kafka.bootstrap-servers=localhost:9093
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

resilience4j.circuitbreaker.instances.kafka-publisher.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.kafka-publisher.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.kafka-publisher.sliding-window-size=5

resilience4j.bulkhead.instances.kafka-publisher.max-concurrent-calls=10
resilience4j.bulkhead.instances.kafka-publisher.max-wait-duration=0ms

resilience4j.retry.instances.pet-db.max-attempts=3
resilience4j.retry.instances.pet-db.wait-duration=200ms
resilience4j.retry.instances.pet-db.retry-exceptions=org.springframework.dao.TransientDataAccessException,org.springframework.dao.RecoverableDataAccessException

management.endpoints.web.exposure.include=health,info,metrics
management.tracing.sampling.probability=1.0
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=pet-api
info.app.version=0.0.1