spring.application.name=pet-api
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/petdb
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=900000
jwt.refresh-expiration=604800000

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.kafka.bootstrap-servers=localhost:9093
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

resilience4j.circuitbreaker.instances.kafka-publisher.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.kafka-publisher.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.kafka-publisher.sliding-window-size=5

management.endpoints.web.exposure.include=health,info,metrics
management.tracing.sampling.probability=1.0
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=pet-api
info.app.version=0.0.1