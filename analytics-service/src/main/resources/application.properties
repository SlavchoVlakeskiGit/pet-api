spring.application.name=analytics-service
server.port=8081

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/analyticsdb?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.analytics.event
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.analytics.event.PetEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

analytics.api-key=${ANALYTICS_API_KEY:dev-api-key-change-in-prod}

spring.mvc.problemdetails.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html
