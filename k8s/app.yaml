apiVersion: apps/v1
kind: Deployment
metadata:
  name: pet-api
  namespace: pet-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pet-api
  template:
    metadata:
      labels:
        app: pet-api
    spec:
      containers:
        - name: pet-api
          image: pet-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: pet-api-config
            - secretRef:
                name: pet-api-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: pet-api-service
  namespace: pet-api
spec:
  selector:
    app: pet-api
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
