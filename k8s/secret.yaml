apiVersion: v1
kind: Secret
metadata:
  name: pet-api-secret
  namespace: pet-api
type: Opaque
stringData:
  # Never commit real values — inject via CI/CD or external-secrets-operator.
  # Example: kubectl create secret generic pet-api-secret \
  #   --from-literal=SPRING_DATASOURCE_USERNAME=petapi \
  #   --from-literal=SPRING_DATASOURCE_PASSWORD=<strong-password> \
  #   --from-literal=JWT_SECRET=$(openssl rand -hex 32) \
  #   -n pet-api
  SPRING_DATASOURCE_USERNAME: "REPLACE_ME"
  SPRING_DATASOURCE_PASSWORD: "REPLACE_ME"
  JWT_SECRET: "REPLACE_ME"
